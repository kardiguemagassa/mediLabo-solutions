# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                     MEDILABO SOLUTIONS - DOCKER COMPOSE                    ║
# ║                                                                            ║
# ║  🏗️  Architecture: 7 Microservices + Frontend                              ║
# ║  🔒 Security: 12-Factor App - Secrets from .env, hosts overridden here     ║
# ║                                                                            ║
# ║  📋 Prerequisites:                                                         ║
# ║     1. Run: infra.sh start-db && infra.sh start-mongodb && infra.sh start-kafka
# ║     2. Connect infra to network:                                           ║
# ║        docker network connect medilabo-network postgres                    ║
# ║        docker network connect medilabo-network mongodb                     ║
# ║        docker network connect medilabo-network kafka                       ║
# ║                                                                            ║
# ║  ⚠️  Note: .env keeps localhost for IntelliJ, Docker hosts are here        ║
# ╚════════════════════════════════════════════════════════════════════════════╝


# ANCRES
x-common-java: &common-java
  env_file: .env
  restart: unless-stopped
  deploy:
    resources:
      limits:
        memory: 768M
        cpus: '0.5'
      reservations:   
        memory: 256M

# LES SERVICES
services:

  discovery-server:
    <<: *common-java
    build:
      context: ./backend/discoveryserverservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/discoveryserverservice:${IMAGE_TAG:-latest}
    container_name: medilabo-discovery
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${DISCOVERY_SERVER_PORT:-8761}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_AUTHORIZATION:-medilabo_authorization}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_HOST: discovery-server
    ports:
      - "${DISCOVERY_SERVER_PORT:-8761}:${DISCOVERY_SERVER_PORT:-8761}"
    networks:
      - medilabo-network
      - postgres-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:${DISCOVERY_SERVER_PORT:-8761}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  authorization-server:
    <<: *common-java
    build:
      context: ./backend/authorizationserverservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/authorizationserverservice:${IMAGE_TAG:-latest}
    container_name: medilabo-authorization
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${AUTHORIZATION_SERVER_PORT:-9001}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_AUTHORIZATION:-medilabo_authorization}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_HOST: discovery-server
      private: ${RSA_PRIVATE_KEY_PATH}
      public: ${RSA_PUBLIC_KEY_PATH}
    volumes:
       - ./.keys:/app/src/main/resources/keys:ro
    ports:
      - "${AUTHORIZATION_SERVER_PORT:-9001}:${AUTHORIZATION_SERVER_PORT:-9001}"
    networks:
      - medilabo-network
      - postgres-network
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${AUTHORIZATION_SERVER_PORT:-9001}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  gateway-server:
    <<: *common-java
    build:
      context: ./backend/gatewayserverservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/gatewayserverservice:${IMAGE_TAG:-latest}
    container_name: medilabo-gateway
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${GATEWAY_SERVER_PORT:-8080}
      EUREKA_HOST: discovery-server
      AUTH_SERVER_URL: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks
    ports:
      - "${GATEWAY_SERVER_PORT:-8080}:${GATEWAY_SERVER_PORT:-8080}"
    networks:
      - medilabo-network
    depends_on:
      discovery-server:
        condition: service_healthy
      authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${GATEWAY_SERVER_PORT:-8080}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  user-service:
    <<: *common-java
    build:
      context: ./backend/userservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/userservice:${IMAGE_TAG:-latest}
    container_name: medilabo-user
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${USER_SERVICE_PORT:-8085}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_AUTHORIZATION:-medilabo_authorization}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_HOST: discovery-server
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      APP_PHOTO_DIRECTORY: /app/uploads/
    volumes:
      - user_uploads:/app/uploads
    ports:
      - "${USER_SERVICE_PORT:-8085}:${USER_SERVICE_PORT:-8085}"
    networks:
      - medilabo-network
      - postgres-network
      - kafka-network
    depends_on:
      discovery-server:
        condition: service_healthy
      authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${USER_SERVICE_PORT:-8085}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  patient-service:
    <<: *common-java
    build:
      context: ./backend/patientservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/patientservice:${IMAGE_TAG:-latest}
    container_name: medilabo-patient
    environment:
      SPRING_PROFILES_ACTIVE: prod
      EUREKA_INSTANCE_HOSTNAME: patient-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SERVER_PORT: ${PATIENT_SERVICE_PORT:-8081}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_PATIENTS:-medilabo_patients}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_HOST: discovery-server
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks        
      AUTH_SERVER_ISSUER_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}
      USER_SERVICE_URL: http://user-service:8085
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PATIENT_SERVICE_HOST: patient-service
    ports:
      - "${PATIENT_SERVICE_PORT:-8081}:${PATIENT_SERVICE_PORT:-8081}"
    networks:
      - medilabo-network
      - postgres-network
      - kafka-network
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PATIENT_SERVICE_PORT:-8081}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  notes-service:
    <<: *common-java
    build:
      context: ./backend/notesservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/notesservice:${IMAGE_TAG:-latest}
    container_name: medilabo-notes
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_CLOUD_LOADBALANCER_ENABLED: "false"
      # URLs directes
      PATIENT_SERVICE_URL: http://patient-service:8081
      NOTES_SERVICE_URL: http://notes-service:8082
      EUREKA_INSTANCE_HOSTNAME: notes-service
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"
      SERVER_PORT: ${NOTES_SERVICE_PORT:-8082}
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-medilabo_notes}?authSource=admin
      EUREKA_HOST: discovery-server
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks      
      AUTH_SERVER_ISSUER_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      NOTES_SERVICE_HOST: notes-service
    volumes:
      - notes_uploads:/app/uploads
    ports:
      - "${NOTES_SERVICE_PORT:-8082}:${NOTES_SERVICE_PORT:-8082}"
    networks:
      - medilabo-network
      - mongodb-network
      - kafka-network
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${NOTES_SERVICE_PORT:-8082}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  assessment-service:
    <<: *common-java
    build:
      context: ./backend/assessmentservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/assessmentservice:${IMAGE_TAG:-latest}
    container_name: medilabo-assessment
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${ASSESSMENT_SERVICE_PORT:-8083}
      EUREKA_HOST: discovery-server
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks
      AUTH_SERVER_ISSUER_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PATIENT_SERVICE_URL: http://patient-service:8081   
      NOTES_SERVICE_URL: http://notes-service:8082       
    ports:
      - "${ASSESSMENT_SERVICE_PORT:-8083}:${ASSESSMENT_SERVICE_PORT:-8083}"
    networks:
      - medilabo-network
      - kafka-network      
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${ASSESSMENT_SERVICE_PORT:-8083}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  notification-service:
    <<: *common-java
    build:
      context: ./backend/notificationservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/notificationservice:${IMAGE_TAG:-latest}
    container_name: medilabo-notification
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: ${NOTIFICATION_SERVICE_PORT:-8084}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB_NOTIFICATION:-medilabo_notification}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_HOST: discovery-server
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUTH_SERVER_URL: http://authorization-server:9001
      PATIENT_SERVICE_URL: http://patient-service:8081
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks
      AUTH_SERVER_ISSUER_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8084}:${NOTIFICATION_SERVICE_PORT:-8084}"
    networks:
      - medilabo-network
      - postgres-network
      - kafka-network
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${NOTIFICATION_SERVICE_PORT:-8084}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend/mediLabo-solutions-ui
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-medilabo}/frontend:${IMAGE_TAG:-latest}
    container_name: medilabo-frontend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'  # limite à 50% d'un CPU
        reservations:
          memory: 128M
    environment:
      API_URL: http://localhost:8080
    ports:
      - "${UI_PORT:-4200}:80"
    networks:
      - medilabo-network
    depends_on:
      gateway-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

# RÉSEAUX
networks:
  medilabo-network:
    name: medilabo-network
    driver: bridge
  postgres-network:
    name: postgres-network
    external: true
  mongodb-network:
    name: mongodb-network
    external: true
  kafka-network:
    external: true

# VOLUMES
volumes:
  notes_uploads:
  user_uploads: