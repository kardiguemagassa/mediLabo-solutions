      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_HOST: discovery-server
      JWKS_URI: http://authorization-server:${AUTHORIZATION_SERVER_PORT:-9001}/oauth2/jwks
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PHOTO_UPLOAD_DIR: /app/uploads/
    volumes:
      # - user_uploads:/app/uploads # volume Docker pour persistance
      - /Users/kara/Downloads/uploads/mediLabo:/app/uploads # chemin local pour développement (remplace le volume Docker)
    ports:
      - "${USER_SERVICE_PORT:-8085}:${USER_SERVICE_PORT:-8085}"
    networks:
      - medilabo-network
      - postgres-network
      - kafka-network
    depends_on:
      discovery-server:
        condition: service_healthy
      authorization-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${USER_SERVICE_PORT:-8085}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  patient-service:
    <<: *common-java
    build:
      context: ./backend/patientservice
      dockerfile: Dockerfile
    image: ${DOCKER_REGISTRY:-localhost:8186}/medilabo/patientservice:${CONTAINER_TAG:-latest}
