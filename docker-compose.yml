      PATIENT_SERVICE_HOST: patient-service
    ports:
      - "${PATIENT_SERVICE_PORT:-8081}:${PATIENT_SERVICE_PORT:-8081}"
    networks:
      - medilabo-network
      - postgres-network
      - kafka-network
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PATIENT_SERVICE_PORT:-8081}/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s

  notes-service:
    <<: *common-java
    build:
      context: ./backend/notesservice
