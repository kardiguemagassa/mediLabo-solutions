# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              PATIENT SERVICE - Main Configuration                          ║
# ║                                                                            ║
# ║  🔒 SECURITY: No secrets in this file                                      ║
# ║  All sensitive values come from environment variables                      ║
# ║                                                                            ║
# ║  📋 Required environment variables:                                        ║
# ║     - POSTGRES_HOST, POSTGRES_PORT, POSTGRES_USERNAME, POSTGRES_PASSWORD   ║
# ║     - POSTGRES_DB_PATIENTS                                                 ║
# ║     - EUREKA_HOST, EUREKA_USERNAME, EUREKA_PASSWORD                        ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: patientservice

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # DATABASE CONFIGURATION
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_PATIENTS}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database: POSTGRESQL
    open-in-view: false
    generate-ddl: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  #SÉCURITÉ
  security:
    oauth2:
      resourceserver:
        jwt:
          # On priorise l'URL complète si elle est dans le .env
          # sinon on reconstruit dynamiquement pour Docker
          jwk-set-uri: ${JWKS_URI:http://localhost:9001/oauth2/jwks}

  # KAFKA CONFIGURATION - POUR LES NOTIFICATIONS
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8085}
    timeout: 5000

# SERVER CONFIGURATION
server:
  port: ${PATIENT_SERVICE_PORT:8081}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      patientService:
        baseConfig: default
      notesService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      patientService:
        baseConfig: default
      notesService:
        baseConfig: default

# EUREKA CLIENT
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:8761}/eureka/


# SWAGGER URL GATEWAY
springdoc:
  api-docs:
    path: /api/patients/v3/api-docs


# ACTUATOR - HEALTH & METRICS
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    circuitbreakers:
      enabled: true
    atelimiters:
      enabled: true
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# LOGGING CONFIGURATION
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.openclassrooms: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
