# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              AUTHORIZATION SERVER (OAuth2) - Main Configuration            ║
# ║                                                                            ║
# ║  🔒 SECURITY: No secrets in this file                                      ║
# ║  All sensitive values come from environment variables                      ║
# ║                                                                            ║
# ║  📋 Required environment variables:                                        ║
# ║     - POSTGRES_HOST, POSTGRES_PORT, POSTGRES_USERNAME, POSTGRES_PASSWORD   ║
# ║     - POSTGRES_DB_AUTHORIZATION                                            ║
# ║     - EUREKA_HOST, EUREKA_USERNAME, EUREKA_PASSWORD                        ║
# ║     - UI_APP_URL                                                           ║
# ║     - RSA_PRIVATE_KEY_PATH, RSA_PUBLIC_KEY_PATH (paths to key files)       ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: authorizationserverservice

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # DATABASE CONFIGURATION
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_AUTHORIZATION}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

# SERVER CONFIGURATION
server:
  port: ${AUTHORIZATION_SERVER_PORT:9001}
  shutdown: graceful
  forward-headers-strategy: framework
  error:
    include-message: always
    include-binding-errors: always

# EUREKA CLIENT
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:8761}/eureka/

# ACTUATOR - HEALTH & METRICS
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# LOGGING CONFIGURATION
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.openclassrooms: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.security.oauth2: ${LOG_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# RSA KEYS CONFIGURATION FOR JWT SIGNING
keys:
  private: ${RSA_PRIVATE_KEY_PATH}
  public: ${RSA_PUBLIC_KEY_PATH}
