# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              AUTHORIZATION SERVER - Production Profile                     ║
# ║                                                                            ║
# ║  🐳 Docker / Production settings                                           ║
# ║  🔒 No secrets - all credentials from environment variables                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  jpa:
    show-sql: false

# EUREKA INSTANCE DOCKER PRODUCTION
eureka:
  instance:
    hostname: ${AUTHORIZATION_SERVER_HOST:authorization-server}
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}

# LOGGING PRODUCTION LEVEL
logging:
  level:
    root: INFO
    com.openclassrooms: INFO
    org.springframework.security: WARN
    org.springframework.security.oauth2: WARN