# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              AUTHORIZATION SERVER - Test Profile                           ║
# ║                                                                            ║
# ║  🧪 Unit & Integration tests                                               ║
# ║  Uses Testcontainers (PostgreSQL) - No H2 dependency                       ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  datasource:
  sql:
    init:
      mode: always
#      mode: always
#      schema-locations: classpath:schema.sql
#      # Optionnel : pour pré-charger tes clients OAuth2 et utilisateurs de test
      schema-locations: classpath:schema.sql

  jpa:
    hibernate:
      #ddl-auto: none # On laisse le schema.sql gérer la structure
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# SERVER RANDOM PORT
server:
  port: 0

# EUREKA DISABLE FOR TEST
eureka:
  client:
    enabled: false

# RSA KEYS (Tes clés de test pour signer les JWT)
keys:
  private: classpath:test-private.key
  public: classpath:test-public.key

jwks:
  uri: http://localhost:0/oauth2/jwks

ui:
  app:
    url: http://localhost:4200

# LOGGING
logging:
  level:
    root: WARN
    com.openclassrooms: DEBUG
    org.springframework.security: DEBUG # Très utile pour débugger les échecs de login en test
    org.testcontainers: INFO