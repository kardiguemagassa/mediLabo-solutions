# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              AUTHORIZATION SERVER - Test Profile                           ║
# ║                                                                            ║
# ║  🧪 Unit & Integration tests                                               ║
# ║  Uses Testcontainers (PostgreSQL) - No H2 dependency                       ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  datasource:
  # url/username/password gérés par @DynamicPropertySource
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  jpa:                          # ← sous "spring", pas sous "app"
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  photo:
    directory: ${java.io.tmpdir}/

server:
  port: 0

eureka:
  client:
    enabled: false

keys:
  private: classpath:test-private.key
  public: classpath:test-public.key

jwks:
  uri: http://localhost:0/oauth2/jwks

ui:
  app:
    url: http://localhost:4200

logging:
  level:
    root: WARN
    com.openclassrooms: DEBUG