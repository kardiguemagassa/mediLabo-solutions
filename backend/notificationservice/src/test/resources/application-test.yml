spring:
  datasource:
  # url/username/password gérés par @DynamicPropertySource
  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
  cloud:
    discovery:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      group-id: notification-test-group
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9001/oauth2/jwks

eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.openclassrooms.notificationservice: DEBUG