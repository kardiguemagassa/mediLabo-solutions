spring:
  datasource:
    url: jdbc:tc:postgresql:16:///notificationdb_test?TC_INITSCRIPT=schema.sql
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
  sql:
    init:
      mode: never  # Testcontainers initialise déjà via TC_INITSCRIPT

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      group-id: notification-test-group

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9001/oauth2/jwks

eureka:
  client:
    enabled: false

spring.cloud:
  discovery:
    enabled: false

logging:
  level:
    root: WARN
    com.openclassrooms.notificationservice: DEBUG
    org.testcontainers: INFO