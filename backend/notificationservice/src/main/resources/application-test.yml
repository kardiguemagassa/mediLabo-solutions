# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              NOTIFICATION SERVICE - Test Profile                           ║
# ║                                                                            ║
# ║  🧪 Unit & Integration tests                                               ║
# ║  Uses H2 in-memory database, embedded Kafka                                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver

  kafka:
    bootstrap-servers: localhost:9092

  mail:
    host: localhost
    port: 1025

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:9001/oauth2/jwks

server:
  port: 0

eureka:
  client:
    enabled: false
