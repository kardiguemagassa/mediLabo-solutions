# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              NOTIFICATION SERVICE - Production Profile                     ║
# ║                                                                            ║
# ║  🐳 Docker / Production settings                                           ║
# ║  🔒 No secrets - all credentials from environment variables                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  jpa:
    show-sql: false

  # THYMELEAF - ENABLE CACHE FOR PRODUCTION
  thymeleaf:
    cache: true

# EUREKA INSTANCE DOCKER PRODUCTION
eureka:
  instance:
    prefer-ip-address: true # Plus fiable dans Docker
    instance-id: ${spring.application.name}:${random.uuid} # Permet le scaling
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# LOGGING PRODUCTION LEVEL
logging:
  level:
    root: INFO
    com.openclassrooms: INFO
    org.springframework.security: WARN
    org.springframework.kafka: WARN
    org.springframework.mail: INFO
