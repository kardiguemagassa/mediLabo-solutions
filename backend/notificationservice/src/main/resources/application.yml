# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              NOTIFICATION SERVICE - Main Configuration                     ║
# ║                                                                            ║
# ║  🔒 SECURITY: No secrets in this file                                      ║
# ║  All sensitive values come from environment variables                      ║
# ║                                                                            ║
# ║  📋 Required environment variables:                                        ║
# ║     - POSTGRES_HOST, POSTGRES_PORT, POSTGRES_USERNAME, POSTGRES_PASSWORD   ║
# ║     - POSTGRES_DB_NOTIFICATION                                             ║
# ║     - EUREKA_HOST, EUREKA_USERNAME, EUREKA_PASSWORD                        ║
# ║     - KAFKA_SERVER_URL                                                     ║
# ║     - EMAIL_HOST, EMAIL_PORT, EMAIL_USERNAME, EMAIL_PASSWORD               ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: notificationservice

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # DATABASE CONFIGURATION
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_NOTIFICATION}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  # KAFKA CONFIGURATION
  kafka:
    bootstrap-servers:
      - ${KAFKA_SERVER_URL}
    template:
      default-topic: NOTIFICATION_TOPIC
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring:
          json:
            type:
              mapping: Notification:io.getarrays.notificationservice.domain.Notification
            trusted:
              packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # EMAIL CONFIGURATION (SMTP)
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    default-encoding: UTF-8
    properties:
      mail:
        mime:
          charset: UTF-8
        smtp:
          writetimeout: 10000
          connectiontimeout: 10000
          timeout: 10000
          auth: true
          starttls:
            enable: true
            required: true

  # THYMELEAF (EMAIL TEMPLATES)
  thymeleaf:
    suffix: .html
    enabled: true
    cache: false

# SERVER CONFIGURATION
server:
  port: ${NOTIFICATION_SERVICE_PORT:8084}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# Client EUREKA CLIENT
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:8761}/eureka/

# APPLICATION URLs
ui:
  app:
    url: ${UI_APP_URL}

verify:
  email:
    host: ${VERIFY_EMAIL_HOST:http://localhost:4200}

jwks:
  uri: ${JWKS_URI}

# ACTUATOR - HEALTH & METRICS
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# LOGGING CONFIGURATION
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.openclassrooms: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.kafka: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
