# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              NOTIFICATION SERVICE - Development Profile                    ║
# ║                                                                            ║
# ║  🔧 Local development settings                                             ║
# ║  🔒 No secrets - all credentials from environment variables                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # KAFKA - LOCAL DEVELOPMENT
  kafka:
    consumer:
      auto-offset-reset: earliest

  # EMAIL - DEVELOPMENT (CAN BE DISABLED OR USE MAIL HOG)
  mail:
    properties:
      mail:
        smtp:
          starttls:
            enable: true

  # THYMELEAF - NOT CACHE FOR DEVELOPMENT
  thymeleaf:
    cache: false

# EUREKA INSTANCE LOCAL DEVELOPMENT
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# LOGGING - VERBOSE FOR DEBUGGING
logging:
  level:
    com.openclassrooms: DEBUG
    org.springframework.security: DEBUG
    org.springframework.kafka: DEBUG
    org.springframework.mail: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    java.util.concurrent: DEBUG # Pour voir la gestion du pool de threads async