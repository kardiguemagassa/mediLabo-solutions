# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              DISCOVERY SERVER - Test Profile                               ║
# ║                                                                            ║
# ║  🧪 Unit & Integration tests                                               ║
# ║  Uses Testcontainers (PostgreSQL) - Matching Auth Strategy                 ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  datasource:
    # L'URL qui conteneur automatiquement
    url: jdbc:tc:postgresql:16:///eurekadb
    username: test
    password: test
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  sql:
    init:
      mode: always
      # On initialise les tables de sécurité (users/authorities) pour les tests
      schema-locations: classpath:schema.sql
      # admin de test : admin/password
      data-locations: classpath:data-test.sql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# PORT ALÉATOIRE POUR ÉVITER LES CONFLITS
server:
  port: 0

# EUREKA CONFIGURATION POUR LES TESTS
eureka:
  instance:
    hostname: localhost
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
  server:
    # Paramètres pour accélérer les tests
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 0

# LOGGING
logging:
  level:
    root: WARN
    com.openclassrooms: DEBUG
    org.testcontainers: INFO