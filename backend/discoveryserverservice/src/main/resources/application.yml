# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              DISCOVERY SERVER (EUREKA) - Main Configuration                ║
# ║                                                                            ║
# ║  🔒 SECURITY: No secrets in this file                                      ║
# ║  All sensitive values come from environment variables                      ║
# ║                                                                            ║
# ║  📋 Required environment variables:                                        ║
# ║     - POSTGRES_HOST, POSTGRES_PORT, POSTGRES_USERNAME, POSTGRES_PASSWORD   ║
# ║     - POSTGRES_DB_AUTHORIZATION                                            ║
# ║     - EUREKA_USERNAME, EUREKA_PASSWORD                                     ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: discoveryserverservice

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # DATABASE CONFIGURATION
  # EUREKA USES POSTGRESQL TO STORE USER CREDENTIALS FOR DASHBOARD AUTHENTICATION
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB_AUTHORIZATION}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database: POSTGRESQL
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    generate-ddl: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

# SERVER CONFIGURATION
server:
  port: ${EUREKA_PORT:8761}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# EUREKA CLIENT SERVER CONFIGURATION
eureka:
  server:
    expected-client-renewal-interval-seconds: 10
    renewal-percent-threshold: 0.33
    peer-node-read-timeout-ms: 30000
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@localhost:${server.port}/eureka/

# ACTUATOR - HEALTH & METRICS
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# LOGGING CONFIGURATION
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.openclassrooms: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.hibernate.SQL: ${LOG_LEVEL_SQL:WARN}
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
