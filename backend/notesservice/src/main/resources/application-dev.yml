# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              NOTES SERVICE - Development Profile                           ║
# ║                                                                            ║
# ║  🔧 Local development settings                                             ║
# ║  🔒 No secrets - all credentials from environment variables                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  data:
    mongodb:
      # IN DEV, MONGODB OFTEN RUNS WITHOUT AUTHENTICATION
      # SET MONGO_AUTH_ENABLED=TRUE IN .ENV IF YOU NEED AUTH
      auto-index-creation: true
      connect-timeout: 2000

# EUREKA INSTANCE LOCAL DEVELOPMENT
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Pour voir les détails des circuits breakers dans Actuator en dev
management:
  endpoint:
    health:
      show-details: always

# LOGGING - VERBOSE FOR DEBUGGING
logging:
  level:
    com.openclassrooms: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb: DEBUG
    org.mongodb.driver: INFO
