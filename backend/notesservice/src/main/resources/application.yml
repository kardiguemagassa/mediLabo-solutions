# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              NOTES SERVICE - Main Configuration                            ║
# ║                                                                            ║
# ║  🔒 SECURITY: No secrets in this file                                      ║
# ║  All sensitive values come from environment variables                      ║
# ║                                                                            ║
# ║  📋 Required environment variables:                                        ║
# ║     - MONGO_HOST, MONGO_PORT, MONGO_DATABASE                               ║
# ║     - MONGO_USERNAME, MONGO_PASSWORD (if auth enabled)                     ║
# ║     - EUREKA_HOST, EUREKA_USERNAME, EUREKA_PASSWORD                        ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: notesservice
    # FILE STORAGE CONFIGURATION
    storage:
      upload-dir: ${FILE_UPLOAD_DIR:./uploads}
      max-file-size: ${MAX_FILE_SIZE:10485760}  # 10 MB en bytes
      max-request-size: ${MAX_REQUEST_SIZE:52428800}  # 50 MB en bytes
      base-download-url: /api/notes
      allowed-extensions:
        - pdf
        - doc
        - docx
        - xls
        - xlsx
        - jpg
        - jpeg
        - png
        - gif
        - txt
        - csv
      allowed-content-types:
        - application/pdf
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.ms-excel
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - image/jpeg
        - image/png
        - image/gif
        - text/plain
        - text/csv

  # SPRING SERVLET - File Upload Limits
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}
      file-size-threshold: 2KB

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # DATABASE CONFIGURATION MONGODB
  data:
    mongodb:
      host: ${MONGO_HOST}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DATABASE}
      username: ${MONGO_USERNAME:}
      password: ${MONGO_PASSWORD:}
      authentication-database: ${MONGO_AUTH_DATABASE:admin}
      auto-index-creation: false


#  # SECURITY - JWT CONFIGURATION
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVER_ISSUER_URI:http://localhost:9001}

# SERVER CONFIGURATION
server:
  port: ${NOTES_SERVICE_PORT:8082}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# EUREKA CLIENT
eureka:
  client:
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:8761}/eureka/
    instance:
      prefer-ip-address: true
      instance-id: ${spring.application.name}:${random.uuid}


# INTER-SERVICES COMMUNICATION
services:
  patient-service:
    url: ${PATIENT_SERVICE_URL:http://localhost:8081}
    timeout: ${PATIENT_SERVICE_TIMEOUT:5000}
  authorization-server:
    url: ${AUTH_SERVER_URL:http://localhost:9001}
    timeout: ${AUTH_SERVER_TIMEOUT:5000}


# RESILIENCE4J CONFIGURATION
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
    instances:
      patientService:
        ignoreExceptions:
          - com.openclassrooms.notesservice.exception.ApiException
        registerHealthIndicator: true
        slowCallDurationThreshold: 2s
        slowCallRateThreshold: 50
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  retry:
    instances:
      patientService:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
  timelimiter:
    instances:
      patientService:
        timeoutDuration: 5s
        cancelRunningFuture: true

  # KAFKA CONFIGURATION
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false


# ACTUATOR - HEALTH & METRICS
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,circuitbreakers,retry,timelimiters
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}


# LOGGING CONFIGURATION
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.openclassrooms: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    org.springframework.data.mongodb: ${LOG_LEVEL_SQL:WARN}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
