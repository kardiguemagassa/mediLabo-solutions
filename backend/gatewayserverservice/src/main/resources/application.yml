# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              GATEWAY SERVER - Main Configuration                           ║
# ║                                                                            ║
# ║  🔒 SECURITY: No secrets in this file                                      ║
# ║  All sensitive values come from environment variables                      ║
# ║                                                                            ║
# ║  📋 Required environment variables:                                        ║
# ║     - EUREKA_HOST, EUREKA_USERNAME, EUREKA_PASSWORD                        ║
# ║     - JWKS_URI                                                             ║
# ║     - UI_APP_URL                                                           ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: gatewayserverservice

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # CLOUD GATEWAY CONFIGURATION
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

      # ROUTES CONFIGURATION
      routes:
        # AUTHORIZATION SERVER - authorization endpoints
        - id: authorization-server
          uri: lb://AUTHORIZATIONSERVERSERVICE
          predicates:
            - Path=/authorization/**
          filters:
            - StripPrefix=1

        # AUTHORIZATION SERVER - user endpoints
        - id: authorization-server-users
          uri: lb://authorizationserverservice
          predicates:
            - Path=/user/**

        # PATIENT SERVICE
        - id: patient-service
          uri: lb://PATIENTSERVICE
          predicates:
            - Path=/api/patients/**
          filters:
            - name: CircuitBreaker
              args:
                name: patientServiceCircuitBreaker
                fallbackUri: forward:/fallback/patients

        # NOTES SERVICE
        - id: notes-service
          uri: lb://NOTESSERVICE
          predicates:
            - Path=/api/notes/**
          filters:
            - name: CircuitBreaker
              args:
                name: notesServiceCircuitBreaker
                allbackUri: forward:/fallback/notes

        # ASSESSMENT SERVICE
        - id: assessment-service
          uri: lb://ASSESSMENTSERVICE
          predicates:
            - Path=/api/assessments/**
          filters:
            - name: CircuitBreaker
              args:
                name: assessmentServiceCircuitBreaker
                fallbackUri: forward:/fallback/assessments

        # NOTIFICATION SERVICE
        - id: notification-service
          uri: lb://NOTIFICATIONSERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationServiceCircuitBreaker
                fallbackUri: forward:/fallback/notifications

      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins:
              - ${UI_APP_URL}
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - "*"
            allow-credentials: true
            max-age: 3600

  # OAUTH2 RESOURCE SERVER JWT VALIDATION
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI}

# SERVER CONFIGURATION
server:
  port: ${GATEWAY_PORT:8080}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# EUREKA CLIENT
eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT:8761}/eureka/

# ACTUATOR - HEALTH & METRICS
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# LOGGING CONFIGURATION
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.openclassrooms: ${LOG_LEVEL_APP:INFO}
    org.springframework.cloud.gateway: ${LOG_LEVEL_APP:INFO}
    org.springframework.security: ${LOG_LEVEL_SECURITY:WARN}
    reactor.netty: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"