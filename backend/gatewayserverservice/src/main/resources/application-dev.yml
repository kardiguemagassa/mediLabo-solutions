# EUREKA INSTANCE LOCAL DEVELOPMENT
eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true

# LOGGING - VERBOSE FOR DEBUGGING
logging:
  level:
    com.openclassrooms: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    reactor.netty: INFO