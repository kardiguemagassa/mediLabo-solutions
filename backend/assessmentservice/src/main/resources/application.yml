# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              ASSESSMENT SERVICE - Main Configuration                       ║
# ║                                                                            ║
# ║  🔒 Stateless service - No database required                               ║
# ║  Calculates diabetes risk by calling Patient & Notes services              ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: assessmentservice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # <--- INDISPENSABLE pour lier Feign à Resilience4j
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

    #  # SECURITY - JWT CONFIGURATION
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:9001/oauth2/jwks}

server:
  port: ${ASSESSMENT_SERVICE_PORT:8083}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# URLs des services externes
services:
  patient:
    name: PATIENTSERVICE
  notes:
    name: NOTESSERVICE
  timeout: 5000

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      patientService:
        baseConfig: default
      notesService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      patientService:
        baseConfig: default
      notesService:
        baseConfig: default

# SWAGGER URL GATEWAY
springdoc:
  api-docs:
    path: /api/assessments/v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents,prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Logging par défaut
logging:
  level:
    root: INFO
    com.openclassrooms: INFO