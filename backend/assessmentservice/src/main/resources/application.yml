# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              ASSESSMENT SERVICE - Main Configuration                       ║
# ║                                                                            ║
# ║  🔒 Stateless service - No database required                               ║
# ║  Calculates diabetes risk by calling Patient & Notes services              ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: assessmentservice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # RESILIENCE4J
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  # SECURITY - JWT CONFIGURATION
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:9001/oauth2/jwks}

  # KAFKA CONFIGURATION - POUR LES NOTIFICATIONS
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: ${ASSESSMENT_SERVICE_PORT:8083}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_USERNAME:admin}:${EUREKA_PASSWORD:admin}@${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/

# URLs des services externes (dev/local)
services:
  patient:
    url: ${PATIENT_SERVICE_URL:http://localhost:8081}
    name: PATIENTSERVICE
  notes:
    url: ${NOTES_SERVICE_URL:http://localhost:8082}
    name: NOTESSERVICE
  authorization-server:
    url: ${AUTH_SERVER_URL:http://localhost:9001}
  timeout: 5000

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
    instances:
      patientService:
        baseConfig: default
      notesService:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      patientService:
        baseConfig: default
      notesService:
        baseConfig: default

# SWAGGER URL GATEWAY
springdoc:
  api-docs:
    path: /api/assessments/v3/api-docs

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents,prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.openclassrooms: INFO