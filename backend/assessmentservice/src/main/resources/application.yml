# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              ASSESSMENT SERVICE - Main Configuration                       ║
# ║                                                                            ║
# ║  🔒 Stateless service - No database required                               ║
# ║  Calculates diabetes risk by calling Patient & Notes services              ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  application:
    name: assessmentservice
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

    #  # SECURITY - JWT CONFIGURATION
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH_SERVER_ISSUER_URI:http://localhost:9001}

server:
  port: ${ASSESSMENT_SERVICE_PORT:8083}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always

# URLs des services externes
services:
  patient:
    url: ${PATIENT_SERVICE_URL:http://localhost:8081}
  notes:
    url: ${NOTES_SERVICE_URL:http://localhost:8082}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    instances:
      patientService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
      notesService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  timelimiter:
    instances:
      patientService:
        timeoutDuration: 5s
      notesService:
        timeoutDuration: 5s

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# Logging par défaut
logging:
  level:
    root: INFO
    com.openclassrooms: INFO