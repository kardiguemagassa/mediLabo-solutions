# ╔════════════════════════════════════════════════════════════════════════════╗
# ║              ASSESSMENT SERVICE - Production Profile                       ║
# ║                                                                            ║
# ║  🐳 Docker / Production settings                                           ║
# ║  🔒 No secrets - all credentials from environment variables                ║
# ╚════════════════════════════════════════════════════════════════════════════╝

spring:
  config:
    activate:
      on-profile: prod

eureka:
  client:
    service-url:
      # On utilise les variables injectées par le compose
      defaultZone: http://${EUREKA_USERNAME}:${EUREKA_PASSWORD}@${EUREKA_HOST}:${EUREKA_PORT}/eureka/
  instance:
    # TRÈS IMPORTANT : Utilise l'IP dans le réseau Docker pour éviter les lags DNS
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.uuid}

# Configuration des URLs pour les clients Feign/WebClient en PROD
services:
  patient:
    # On utilise le nom du service défini dans docker-compose.yml
    url: http://medilabo-patient:8081
  notes:
    url: http://medilabo-notes:8082