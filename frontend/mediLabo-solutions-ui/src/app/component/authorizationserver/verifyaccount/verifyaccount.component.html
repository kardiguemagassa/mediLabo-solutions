<div class="pt-28 pb-12 px-4">
  <div class="max-w-md mx-auto">

    @if (state()?.loading) {
      <div class="text-center">
        <div class="inline-flex p-6 rounded-2xl bg-white shadow-lg mb-6">
          <svg class="animate-spin h-12 w-12 text-teal-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-2">Vérification du compte...</h2>
        <p class="text-gray-500">Veuillez patienter pendant que nous vérifions votre compte</p>
      </div>
    } @else {
      <div class="flex flex-col items-center">
        <div class="bg-white rounded-2xl card-shadow p-8 border border-gray-100 w-full">

          <!-- Success Alert -->
          @if (state()?.message) {
            <div class="flex items-start gap-3 p-4 mb-6 bg-green-50 border border-green-100 rounded-xl">
              <svg class="w-5 h-5 text-green-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
              </svg>
              <p class="flex-1 text-sm font-medium text-green-600">{{ state()?.message }}</p>
              <button (click)="closeMessage()" type="button" class="p-1 hover:bg-green-100 rounded-lg transition-colors">
                <svg class="w-4 h-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          }

          <!-- Error Alert -->
          @if (state()?.error) {
            <div class="flex items-start gap-3 p-4 mb-6 bg-red-50 border border-red-100 rounded-xl">
              <svg class="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
              </svg>
              <p class="flex-1 text-sm font-medium text-red-600">{{ state()?.error }}</p>
              <button (click)="closeMessage()" type="button" class="p-1 hover:bg-red-100 rounded-lg transition-colors">
                <svg class="w-4 h-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>
          }

          <!-- Actions -->
          <div class="mt-4">
            <a [routerLink]="['/resetpassword']" class="text-sm text-teal-600 hover:text-teal-700 font-medium transition-colors hover:underline">
              Mot de passe oublié ?
            </a>
            <div class="mt-4 flex flex-col sm:flex-row gap-3">
              <a href="http://localhost:9001/oauth2/authorize?response_type=code&client_id=client&scope=openid&redirect_uri=http://localhost:4200&code_challenge_method=S256&code_challenge=yLTPU5_n1a3ZtxFMoiguWiMYwpp7tm0vCZHXVnPStFk"
                class="flex-1 py-2.5 px-5 rounded-xl text-white font-medium text-sm text-center medical-gradient btn-shadow transition-all duration-200 flex items-center justify-center gap-2">
                Se connecter
              </a>
              <a [routerLink]="['']" class="flex-1 py-2.5 px-5 rounded-xl bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium text-sm text-center transition-all duration-200 flex items-center justify-center gap-2">
                Retour à l'accueil
              </a>
            </div>
          </div>

        </div>
      </div>
    }

  </div>
</div>
